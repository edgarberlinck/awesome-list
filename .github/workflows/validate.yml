name: Validate Resources

on:
  pull_request:
    paths:
      - '**.yml'
      - 'scripts/validate.js'
      - 'scripts/link-check.js'
      - 'package.json'
      - 'package-lock.json'
  push:
    branches:
      - main
    paths:
      - '**.yml'
      - 'scripts/validate.js'
      - 'scripts/link-check.js'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate YAML and metadata
        run: npm run validate

      - name: Check links
        run: npm run check-links
